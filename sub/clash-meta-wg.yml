- name: 🔰 PROXIES
  type: select
  proxies:
  - 🇮🇷 AUTO-IRN-ENTRY
  - 🇩🇪 AUTO-GER-DIALER
  - DIRECT
  - GER-DIALER-01
  - GER-DIALER-02
  - GER-DIALER-03
  - GER-DIALER-04
  - GER-DIALER-05
  - GER-DIALER-06
  - GER-DIALER-07
